services:
  # Django Web Service
  - type: web
    name: socialpulse-web
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && npm run build && cd ..
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: socialpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString

  # Celery Worker
  - type: worker
    name: socialpulse-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend worker --loglevel=info
    envVars:
      - key: SECRET_KEY
        fromService:
          name: socialpulse-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: socialpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  # Celery Beat
  - type: worker
    name: socialpulse-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: SECRET_KEY
        fromService:
          name: socialpulse-web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: socialpulse-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: socialpulse-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false

databases:
  - name: socialpulse-db
    plan: free

  - name: socialpulse-redis
    plan: free